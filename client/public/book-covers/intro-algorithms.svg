<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" role="img" aria-labelledby="title desc">
  <title id="title">Introduction to Algorithms book cover</title>
  <desc id="desc">Local cover artwork for Introduction to Algorithms by Thomas H. Cormen.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="45%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="600" height="800" rx="30" fill="url(#bg)"/>
  <rect x="54" y="64" width="492" height="672" rx="26" fill="url(#panel)" filter="url(#shadow)"/>
  <path d="M102 186h396M102 246h252M102 306h332M102 366h196" stroke="#93c5fd" stroke-width="10" stroke-linecap="round" opacity="0.55"/>

  <g transform="translate(112 402)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="36" cy="36" r="24" fill="#60a5fa" stroke="#bfdbfe" stroke-width="8"/>
    <circle cx="188" cy="20" r="24" fill="#38bdf8" stroke="#bae6fd" stroke-width="8"/>
    <circle cx="320" cy="82" r="24" fill="#22c55e" stroke="#bbf7d0" stroke-width="8"/>
    <circle cx="176" cy="168" r="24" fill="#fbbf24" stroke="#fde68a" stroke-width="8"/>
    <path d="M58 34l106-12M211 31l86 40M298 96l-100 58M161 155L55 52" stroke="#e0f2fe" stroke-width="12"/>
  </g>

  <text x="96" y="102" fill="#bfdbfe" font-family="Georgia, serif" font-size="30" font-weight="700" letter-spacing="3">MIT PRESS</text>
  <text x="96" y="566" fill="#ffffff" font-family="Georgia, serif" font-size="56" font-weight="700">
    <tspan x="96" dy="0">Introduction</tspan>
    <tspan x="96" dy="62">to Algorithms</tspan>
  </text>
  <text x="96" y="700" fill="#bfdbfe" font-family="Arial, sans-serif" font-size="28" font-weight="700">Thomas H. Cormen</text>
  <rect x="54" y="64" width="492" height="672" rx="26" fill="none" stroke="#bfdbfe" stroke-width="2" opacity="0.5"/>
</svg>
