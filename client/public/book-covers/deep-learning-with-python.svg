<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" role="img" aria-labelledby="title desc">
  <title id="title">Deep Learning with Python book cover</title>
  <desc id="desc">Local cover artwork for Deep Learning with Python by Francois Chollet.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="52%" stop-color="#164e63"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="50%">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.9"/>
      <stop offset="65%" stop-color="#0891b2" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020617" flood-opacity="0.36"/>
    </filter>
  </defs>

  <rect width="600" height="800" rx="30" fill="url(#bg)"/>
  <rect x="54" y="62" width="492" height="676" rx="28" fill="#07111f" opacity="0.82" filter="url(#shadow)"/>
  <rect x="54" y="62" width="492" height="676" rx="28" fill="url(#glow)"/>

  <g transform="translate(120 232)" fill="none" stroke-linecap="round">
    <path d="M45 150c42-90 122-134 236-132 56 2 98 21 125 58" stroke="#22d3ee" stroke-width="14"/>
    <path d="M42 214c58-68 128-102 210-104 72-1 132 23 178 72" stroke="#fb923c" stroke-width="14"/>
    <path d="M70 278c66-54 138-78 216-72 62 5 111 28 148 68" stroke="#a7f3d0" stroke-width="14"/>
    <circle cx="58" cy="145" r="17" fill="#22d3ee"/>
    <circle cx="168" cy="52" r="17" fill="#22d3ee"/>
    <circle cx="318" cy="52" r="17" fill="#22d3ee"/>
    <circle cx="428" cy="176" r="17" fill="#fb923c"/>
    <circle cx="70" cy="278" r="17" fill="#a7f3d0"/>
    <circle cx="286" cy="206" r="17" fill="#a7f3d0"/>
  </g>

  <text x="92" y="126" fill="#fed7aa" font-family="Arial, sans-serif" font-size="28" font-weight="800" letter-spacing="4">MANNING</text>
  <text x="92" y="558" fill="#ffffff" font-family="Georgia, serif" font-size="58" font-weight="700">
    <tspan x="92" dy="0">Deep Learning</tspan>
    <tspan x="92" dy="64">with Python</tspan>
  </text>
  <text x="92" y="700" fill="#bae6fd" font-family="Arial, sans-serif" font-size="28" font-weight="700">Francois Chollet</text>
  <rect x="54" y="62" width="492" height="676" rx="28" fill="none" stroke="#67e8f9" stroke-width="2" opacity="0.45"/>
</svg>
