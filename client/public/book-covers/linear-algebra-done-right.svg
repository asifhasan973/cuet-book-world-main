<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" role="img" aria-labelledby="title desc">
  <title id="title">Linear Algebra Done Right book cover</title>
  <desc id="desc">Local cover artwork for Linear Algebra Done Right by Sheldon Axler.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="48%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#7c2d12"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#fed7aa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#7c2d12" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="600" height="800" rx="30" fill="url(#bg)"/>
  <rect x="58" y="60" width="484" height="680" rx="30" fill="url(#panel)" filter="url(#shadow)"/>
  <rect x="102" y="150" width="396" height="282" rx="18" fill="#ffffff" opacity="0.78"/>

  <g transform="translate(124 176)" fill="none" stroke="#9a3412" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 204h348M38 242V0" stroke-width="8" opacity="0.6"/>
    <path d="M42 204l104-106 70 64 104-126" stroke-width="14"/>
    <path d="M42 204l154-32 124-136" stroke="#ea580c" stroke-width="10" opacity="0.75"/>
    <path d="M146 98v104M216 162v40M320 36v166" stroke-width="7" opacity="0.38"/>
    <circle cx="146" cy="98" r="15" fill="#9a3412"/>
    <circle cx="216" cy="162" r="15" fill="#ea580c"/>
    <circle cx="320" cy="36" r="15" fill="#9a3412"/>
  </g>

  <text x="92" y="114" fill="#9a3412" font-family="Arial, sans-serif" font-size="28" font-weight="800" letter-spacing="4">SPRINGER</text>
  <text x="92" y="552" fill="#431407" font-family="Georgia, serif" font-size="58" font-weight="700">
    <tspan x="92" dy="0">Linear Algebra</tspan>
    <tspan x="92" dy="64">Done Right</tspan>
  </text>
  <text x="92" y="700" fill="#9a3412" font-family="Arial, sans-serif" font-size="28" font-weight="700">Sheldon Axler</text>
  <rect x="58" y="60" width="484" height="680" rx="30" fill="none" stroke="#9a3412" stroke-width="2" opacity="0.28"/>
</svg>
